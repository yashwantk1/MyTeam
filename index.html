<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dream Team Generator</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4f46e5">
  <style>
    body{font-family:Arial,sans-serif;background:#020617;color:white;padding:20px;margin:0}
    .card{background:#111827;border-radius:20px;padding:20px;max-width:800px;margin:auto}
    .team{background:#1f2937;border-radius:16px;padding:12px;margin:10px 0}
    button{background:#4f46e5;color:white;border:none;padding:12px 18px;border-radius:12px}
  </style>
</head>
<body>
  <div class="card">
    <h1>Dream Team Generator</h1>
    <p>Sample fantasy cricket team generator PWA.</p>
    <button onclick="generate()">Generate Teams</button>
    <div id="teams"></div>
  </div>
  <script>
    const sample = [
      "Virat Kohli (C)","Jasprit Bumrah (VC)","Rohit Sharma","Hardik Pandya",
      "KL Rahul","Shubman Gill","Ravindra Jadeja","Pat Cummins",
      "Mitchell Starc","Glenn Maxwell","Mohammed Siraj"
    ];
    function generate(){
      document.getElementById('teams').innerHTML =
        '<div class="team"><h3>Team 1</h3>' + sample.join('<br>') + '</div>';
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
